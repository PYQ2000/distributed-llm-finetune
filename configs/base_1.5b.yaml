model_name: Qwen/Qwen2.5-1.5B
dataset_name: llamafactory/alpaca_gpt4_zh
dataset_split: train
max_samples: 3000
max_seq_len: 1024
output_dir: outputs/run-1.5b   # E5/E6 复用本文件，跑时各自 --output_dir/--run_name 覆盖
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 1.0
max_steps: -1
warmup_ratio: 0.03
weight_decay: 0.0
logging_steps: 5
save_strategy: "no"   # E5(OOM)/E6 不需要存模型
save_steps: 50
save_total_limit: 2
seed: 42
fp16: true
bf16: false
gradient_checkpointing: true   # E6 双卡 ZeRO-3 时给 GPU 留余量；E5 单卡仍会 OOM
run_name: run-1.5b
wandb_project: distributed-llm-finetune
report_to: wandb
